{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:25px;">🧾 Buyer Dashboard</h2>

<style>
.buyer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:22px;
}

/* PERFECT CARD */
.buyer-card{
    height:220px;
    border-radius:18px;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
    padding:20px;
    width:100%;
}

/* TEXT */
.buyer-card h2{
    font-size:24px;
    margin:0;
    line-height:1.3;
}

/* COLORS */
.credit{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.receive{
    background:linear-gradient(135deg,#16a34a,#15803d);
}
</style>

<div class="buyer-grid">

    <a href="/credit-report" class="buyer-card credit">
        <div>
            📦<br><br>
            <h2>Credit Report</h2>
        </div>
    </a>

    <a href="/receive-buyer-payment" class="buyer-card receive">
        <div>
            💰<br><br>
            <h2>Receive Buyer Payment</h2>
        </div>
    </a>

</div>

{% endblock %}
