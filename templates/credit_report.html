{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">📑 Credit Report</h2>

<div style="overflow-x:auto;">
<table style="width:100%;border-collapse:collapse;background:white;">
    <tr style="background:#111827;color:white;">
        <th style="padding:12px;">Date</th>
        <th style="padding:12px;">Buyer</th>
        <th style="padding:12px;">Due</th>
        <th style="padding:12px;">Receive</th>
    </tr>

    {% for r in rows %}
    <tr style="text-align:center;border-bottom:1px solid #e5e7eb;">
        <td style="padding:10px;">{{ r[1]|datefmt }}</td>
        <td style="padding:10px;">{{ r[2] }}</td>
        <td style="padding:10px;">{{ "%.2f"|format(r[3]) }}</td>

        <td style="padding:10px;">
            {% if is_owner %}
            <form method="POST" style="display:flex;gap:8px;justify-content:center;">
                <input type="hidden" name="entry_id" value="{{ r[0] }}">
                <input type="number" step="0.01" name="amount"
                       placeholder="Amt"
                       required
                       style="width:90px;padding:6px;border-radius:6px;border:1px solid #ccc;">

                <button type="submit"
                        onclick="this.innerText='Received'; this.style.background='#166534';"
                        style="background:#16a34a;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">
                    Receive
                </button>
            </form>
            {% else %}
                -
            {% endif %}
        </td>
    </tr>
    {% endfor %}

    <!-- TOTAL -->
    <tr style="background:#111827;color:white;font-weight:bold;">
        <td colspan="2" style="padding:12px;text-align:right;">TOTAL DUE</td>
        <td style="padding:12px;">
            {{ "%.2f"|format(rows|sum(attribute=3)) }}
        </td>
        <td></td>
    </tr>

</table>
</div>

{% endblock %}
